<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务学习模拟</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 悬浮返回按钮，仅在非嵌入模式下显示 */
        .top-control-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .top-control-bar:hover {
            opacity: 1;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateX(-4px);
        }

        .iframe-wrap {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .iframe-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1677ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 嵌入模式：隐藏顶部悬浮按钮 */
        body.embedded .top-control-bar {
            display: none;
        }

        body.embedded .container {
            padding: 0 20px;
            background: #f5f5f5;
        }

        body.embedded .iframe-wrap {
            border-radius: 8px;
            margin-bottom: 20px;
            background: #fff;
            border: 1px solid #e8e8e8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 悬浮返回按钮 -->
        <div class="top-control-bar" id="topControlBar">
            <a class="back-btn" href="/student.html">
                <i class="fas fa-arrow-left"></i>
                返回任务列表
            </a>
        </div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p style="color: #666;">资源加载中...</p>
        </div>

        <div class="iframe-wrap">
            <iframe id="simFrame" src="" title="任务学习模拟" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const taskId = params.get('taskId') || '';
            const mode = params.get('mode') || 'separate';
            const methods = params.get('methods') || '';

            // 检测是否在 iframe 中嵌入
            const isEmbedded = params.get('embedded') === '1' || window.self !== window.top;
            if (isEmbedded) {
                document.body.classList.add('embedded');
            }

            const iframe = document.getElementById('simFrame');
            const loadingOverlay = document.getElementById('loadingOverlay');

            if (taskId) {
                iframe.src = '/approvals/grading/simulation/' + taskId + '?mode=' + mode + '&embedded=1&methods=' + encodeURIComponent(methods);

                iframe.onload = function() {
                    loadingOverlay.style.display = 'none';
                };
            } else {
                loadingOverlay.style.display = 'none';
                document.querySelector('.iframe-wrap').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:14px;">缺少任务参数，请从任务列表进入</div>';
            }
        })();
    </script>
</body>
</html>
