<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>场景门户首页</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f8fafc;
    min-height: 100vh;
    color: #1f2937;
  }

  /* Header */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 64px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(226,232,240,0.8);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 1000;
  }
  .header-left { display: flex; align-items: center; gap: 40px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #1677ff, #4c9aff);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px;
    box-shadow: 0 4px 12px rgba(22,119,255,0.25);
  }
  .logo-text { font-size: 18px; font-weight: 700; color: #0f172a; }
  .header-nav { display: flex; align-items: center; gap: 6px; }
  .header-nav-item {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; font-size: 14px; color: #636363;
    border-radius: 6px; text-decoration: none;
    transition: all 0.15s;
    position: relative;
    line-height: 1.5;
  }
  .header-nav-item:hover { background: #f2f2f2; color: #222; }
  .header-nav-item.active { color: #1677ff; font-weight: 500; }
  .header-nav-item.active::after {
    content: "";
    position: absolute; bottom: 0; left: 16px; right: 16px;
    height: 2px; background: #1677ff; border-radius: 1px;
  }
  .header-nav-item i { font-size: 16px; }
  .header-right { display: flex; align-items: center; gap: 18px; }
  .header-time { font-size: 13px; color: #94a3b8; }
  .header-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #64748b; font-size: 15px; cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .header-icon:hover { background: #f1f5f9; }
  .header-bell-badge {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; background: #ef4444;
    color: white; font-size: 10px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .header-user {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 4px; border-radius: 20px;
    background: #f8fafc; border: 1px solid #e2e8f0;
    font-size: 14px; color: #475569; cursor: pointer;
  }
  .header-user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    display: flex; align-items: center; justify-content: center;
    color: #1677ff; font-size: 12px;
  }

  /* Main */
  .main { padding: 88px 32px 48px; max-width: 1600px; margin: 0 auto; }

  /* Hero layout: side panels + carousel */
  .hero-wrapper {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    margin-bottom: 8px;
  }
  .hero-side {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .side-panel {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e2e8f0;
    padding: 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .side-panel-header {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .side-panel-header i { color: #1677ff; font-size: 16px; }
  .side-panel-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 132px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .side-panel-body::-webkit-scrollbar { width: 4px; }
  .side-panel-body::-webkit-scrollbar-thumb {
    background: #cbd5e1; border-radius: 2px;
  }
  .side-panel-body::-webkit-scrollbar-track { background: transparent; }
  .side-item {
    padding: 10px 12px;
    border-radius: 10px;
    background: #f8fafc;
    font-size: 13px;
    color: #334155;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    flex-shrink: 0;
  }
  .side-item:hover { background: #eff6ff; color: #1677ff; border-color: #bfdbfe; }
  .side-item-title { font-weight: 600; margin-bottom: 4px; }
  .side-item-meta { font-size: 12px; color: #94a3b8; }
  .side-empty { color: #94a3b8; font-size: 13px; text-align: center; padding: 20px 0; flex-shrink: 0; }

  /* Hero banner */
  .hero {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    min-height: 380px;
    background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 50%, #3b82f6 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 36px 24px;
  }
  .hero-banner-content { width: 100%; max-width: 560px; }
  .hero-search {
    display: flex; align-items: center;
    background: #fff; border-radius: 50px;
    padding: 6px 6px 6px 18px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.15);
    width: 100%;
  }
  .hero-search-icon { color: #94a3b8; font-size: 16px; margin-right: 10px; }
  .hero-search input {
    flex: 1; border: none; outline: none;
    font-size: 15px; color: #334155; background: transparent;
  }
  .hero-search input::placeholder { color: #94a3b8; }
  .hero-search button {
    background: #1677ff; color: #fff; border: none;
    border-radius: 50px; padding: 12px 32px;
    font-size: 15px; cursor: pointer;
    transition: background 0.2s;
  }
  .hero-search button:hover { background: #3b8cff; }

  /* Category shortcuts */
  .category-bar {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .category-item {
    background: #fff; border-radius: 14px;
    padding: 18px 12px; text-align: center;
    border: 1px solid #e2e8f0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .category-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(22,119,255,0.12);
    border-color: #bfdbfe;
  }
  .category-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px;
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    color: #1677ff; font-size: 18px;
  }
  .category-name { font-size: 14px; font-weight: 600; color: #334155; }
  .category-count { font-size: 12px; color: #94a3b8; margin-top: 4px; }

  /* Stats bar */
  .stats-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 24px; flex-wrap: wrap;
    padding: 8px 0; margin-bottom: 12px;
    font-size: 14px; font-weight: 600; color: #334155;
  }
  .stats-bar-lead { font-weight: 700; color: #1677ff; font-size: 30px; }
  .stats-bar-item { display: flex; align-items: baseline; gap: 8px; }
  .stats-bar-label { color: #334155; font-size: 28px; }
  .stats-bar-value { font-size: 36px; font-weight: 800; color: #1677ff; }
  .stats-bar-divider { width: 1px; height: 36px; background: #cbd5e1; }

  /* Filter */
  .filter-box {
    background: #fff; border-radius: 16px;
    padding: 20px 24px; margin-bottom: 20px;
    border: 1px solid #e2e8f0;
  }
  .filter-row { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; }
  .filter-row + .filter-row { border-top: 1px dashed #e2e8f0; }
  .filter-label { font-size: 14px; color: #64748b; font-weight: 500; min-width: 48px; padding-top: 6px; }
  .filter-tags-wrap { flex: 1; }
  .filter-tags { display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-tags-more { display: none; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .filter-tags-more.expanded { display: flex; }
  .tag {
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; color: #475569; cursor: pointer;
    background: #f8fafc; border: 1px solid #e2e8f0;
    transition: all 0.2s; white-space: nowrap;
  }
  .tag:hover { background: #eff6ff; color: #1677ff; border-color: #bfdbfe; }
  .tag.active { background: linear-gradient(135deg, #1677ff, #3b8cff); color: #fff; border-color: transparent; }
  .expand-btn {
    color: #1677ff; font-size: 13px; cursor: pointer;
    white-space: nowrap; padding-top: 6px; user-select: none;
  }
  .filter-summary {
    display: flex; align-items: center; gap: 12px;
    padding-top: 14px; margin-top: 10px;
    border-top: 1px dashed #e2e8f0;
    font-size: 13px; color: #64748b;
  }
  .filter-summary .chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: #eff6ff; color: #1677ff;
    padding: 4px 10px; border-radius: 12px;
  }
  .filter-summary .chip i { cursor: pointer; font-size: 11px; }
  .clear-btn { color: #1677ff; cursor: pointer; font-size: 13px; }
  .clear-btn:hover { text-decoration: underline; }

  /* Toolbar */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .sort-group { display: flex; gap: 8px; align-items: center; background: #fff; padding: 6px; border-radius: 12px; border: 1px solid #e2e8f0; }
  .sort-btn {
    padding: 8px 16px; border-radius: 10px;
    font-size: 13px; color: #475569; cursor: pointer;
    transition: all 0.2s;
  }
  .sort-btn:hover { color: #1677ff; }
  .sort-btn.active { background: #eff6ff; color: #1677ff; font-weight: 500; }
  .toolbar-search {
    display: flex; align-items: center;
    background: #fff; border-radius: 10px;
    border: 1px solid #e2e8f0;
    padding: 4px 4px 4px 14px;
  }
  .toolbar-search input {
    border: none; outline: none; background: transparent;
    font-size: 13px; color: #334155; width: 180px;
  }
  .toolbar-search input::placeholder { color: #94a3b8; }
  .toolbar-search button {
    background: #1677ff; color: #fff; border: none;
    border-radius: 8px; padding: 7px 14px;
    font-size: 13px; cursor: pointer;
    transition: background 0.2s;
  }
  .toolbar-search button:hover { background: #3b8cff; }
  .result-tip { font-size: 14px; color: #64748b; margin-bottom: 16px; }
  .result-tip b { color: #1677ff; font-weight: 700; }

  /* Pagination */
  .pagination {
    display: flex; justify-content: center; align-items: center;
    gap: 8px; margin-top: 28px;
  }
  .pagination button, .pagination .page-number {
    min-width: 32px; height: 32px;
    border-radius: 8px; border: 1px solid #e2e8f0;
    background: #fff; color: #475569;
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0 10px;
    transition: all 0.2s;
  }
  .pagination button:hover:not(:disabled), .pagination .page-number:hover:not(.active) {
    border-color: #1677ff; color: #1677ff;
  }
  .pagination .page-number.active {
    background: #1677ff; color: #fff; border-color: #1677ff;
  }
  .pagination button:disabled {
    opacity: 0.5; cursor: not-allowed; color: #94a3b8;
  }

  /* Cards */
  .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .scene-card {
    background: #fff; border-radius: 16px; overflow: hidden;
    border: 1px solid #e2e8f0;
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: pointer;
  }
  .scene-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(15,23,42,0.1);
  }
  .card-cover {
    height: 160px; position: relative;
    background-size: cover; background-position: center;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 16px; color: #fff;
  }
  .card-cover::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(15,23,42,0.85) 0%, rgba(15,23,42,0.2) 60%, transparent 100%);
  }
  .card-cover-content { position: relative; z-index: 1; }
  .cover-tags {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; z-index: 1;
  }
  .cover-tag-group { display: flex; gap: 8px; }
  .cover-tag {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; color: #fff;
  }
  .cover-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
  .cover-meta { font-size: 12px; opacity: 0.9; }
  .card-body { padding: 18px; }
  .card-title {
    font-size: 15px; font-weight: 700; color: #0f172a;
    margin-bottom: 14px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 16px;
  }
  .card-stat {
    background: #f8fafc; border-radius: 10px;
    padding: 10px; text-align: center;
  }
  .card-stat-num { font-size: 18px; font-weight: 800; color: #0f172a; }
  .card-stat-label { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 60px; margin-bottom: 10px; }
  .card-tag {
    font-size: 12px; padding: 5px 12px; border-radius: 20px;
    background: #f1f5f9; color: #475569;
  }
  .card-tag.blue { background: #dbeafe; color: #1d4ed8; }
  .card-tag.purple { background: #f3e8ff; color: #7e22ce; }
  .card-tag.orange { background: #ffedd5; color: #c2410c; }
  .card-info-row {
    display: flex; justify-content: space-between;
    font-size: 13px; color: #64748b;
    margin-top: 8px;
  }
  .difficulty-stars { display: inline-flex; gap: 2px; margin-left: 6px; }
  .difficulty-stars .fa-star { font-size: 10px; color: #e2e8f0; }
  .difficulty-stars .fa-star.active { color: #f59e0b; }

  .empty-state {
    text-align: center; padding: 80px 20px; color: #94a3b8;
    grid-column: 1 / -1;
  }
  .empty-state i { font-size: 56px; margin-bottom: 18px; color: #cbd5e1; }
  .empty-state div { font-size: 15px; }

  .footer {
    border-top: 1px solid #e2e8f0;
    background: #fff;
    height: 48px;
    padding: 0 32px;
    flex-shrink: 0;
    margin-top: auto;
  }
  .footer-inner {
    max-width: 1600px;
    height: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #64748b;
  }
  .footer-links { display: flex; align-items: center; gap: 24px; }
  .footer-links span { cursor: pointer; transition: color 0.2s; }
  .footer-links span:hover { color: #1677ff; }

  @media (max-width: 1200px) {
    .hero-wrapper { grid-template-columns: 1fr; }
    .hero-side { flex-direction: row; }
    .side-panel { min-width: 0; }
    .card-grid { grid-template-columns: repeat(3, 1fr); }
    .category-bar { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 768px) {
    .header { padding: 0 16px; }
    .header-nav { display: none; }
    .main { padding: 80px 16px 32px; }
    .hero-side { flex-direction: column; }
    .carousel-title { font-size: 26px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .card-grid { grid-template-columns: 1fr; }
    .category-bar { grid-template-columns: repeat(2, 1fr); }
    .toolbar { flex-direction: column; gap: 12px; align-items: flex-start; }
    .footer { padding: 0 16px; }
    .footer-inner { flex-direction: column; gap: 4px; height: auto; padding: 8px 0; }
  }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="header">
  <div class="header-left">
    <a href="#" class="logo">
      <div class="logo-icon"><i class="fa fa-cube"></i></div>
      <div class="logo-text">场景化数智教学服务平台</div>
    </a>
    <div class="header-nav">
      <a href="http://111.170.170.202:3001/portal" target="_blank" class="header-nav-item"><i class="fa fa-home"></i>门户首页</a>
      <a href="http://111.170.170.202:3001/portal/workspace" target="_blank" class="header-nav-item"><i class="fa fa-th-large"></i>我的服务台</a>
      <a href="http://111.170.170.202:3001/portal/apps" target="_blank" class="header-nav-item"><i class="fa fa-cog"></i>应用服务中心</a>
    </div>
  </div>
  <div class="header-right">
    <span class="header-time" id="headerTime">2026年05月09日 星期六 11:20</span>
    <div class="header-icon">
      <i class="fa fa-bell"></i>
      <span class="header-bell-badge">3</span>
    </div>
    <div class="header-user">
      <div class="header-user-avatar"><i class="fa fa-user"></i></div>
      <span>管理员</span>
    </div>
  </div>
</div>

<div class="main">

  <!-- Hero 轮播区 -->
  <div class="hero-wrapper">
    <div class="hero" id="heroCarousel">
      <div class="hero-banner-content">
        <div class="hero-search">
          <i class="fa fa-search hero-search-icon"></i>
          <input type="text" id="mainSearchInput" placeholder="搜索场景名称、岗位编码或关键词">
          <button id="mainSearchBtn">搜索</button>
        </div>
      </div>
    </div>
    <div class="hero-side">
      <div class="side-panel">
        <div class="side-panel-header"><i class="fa fa-bullseye"></i>目标岗位场景</div>
        <div class="side-panel-body" id="targetPositionScenarios"></div>
      </div>
      <div class="side-panel">
        <div class="side-panel-header"><i class="fa fa-heart"></i>心仪岗位场景</div>
        <div class="side-panel-body" id="favoritePositionScenarios"></div>
      </div>
    </div>
  </div>

  <!-- 统计条 -->
  <div class="stats-bar" id="statsRow">
    <div class="stats-bar-lead">场景化数智教学服务平台</div>
    <div class="stats-bar-divider"></div>
    <div class="stats-bar-item">
      <span class="stats-bar-label">收录场景数</span>
      <span class="stats-bar-value" id="statTotal">0</span>
    </div>
    <div class="stats-bar-divider"></div>
    <div class="stats-bar-item">
      <span class="stats-bar-label">已发布场景</span>
      <span class="stats-bar-value" id="statPublished">0</span>
    </div>
    <div class="stats-bar-divider"></div>
    <div class="stats-bar-item">
      <span class="stats-bar-label">涉及任务数</span>
      <span class="stats-bar-value" id="statTasks">0</span>
    </div>
    <div class="stats-bar-divider"></div>
    <div class="stats-bar-item">
      <span class="stats-bar-label">覆盖岗位数</span>
      <span class="stats-bar-value" id="statPositions">0</span>
    </div>
  </div>

  <!-- 筛选区 -->
  <div class="filter-box">
    <div class="filter-row">
      <span class="filter-label">行业</span>
      <div class="filter-tags-wrap">
        <div class="filter-tags" id="industryTags"></div>
        <div class="filter-tags-more" id="industryTagsMore"></div>
      </div>
      <span class="expand-btn" data-target="industryTagsMore">展开</span>
    </div>
    <div class="filter-row">
      <span class="filter-label">专业</span>
      <div class="filter-tags-wrap">
        <div class="filter-tags" id="professionTags"></div>
        <div class="filter-tags-more" id="professionTagsMore"></div>
      </div>
      <span class="expand-btn" data-target="professionTagsMore">展开</span>
    </div>
    <div class="filter-row">
      <span class="filter-label">岗位</span>
      <div class="filter-tags-wrap">
        <div class="filter-tags" id="positionTags"></div>
        <div class="filter-tags-more" id="positionTagsMore"></div>
      </div>
      <span class="expand-btn" data-target="positionTagsMore">展开</span>
    </div>
    <div class="filter-summary" id="filterSummary" style="display:none;">
      <span>已选条件：</span>
      <span id="activeFilters"></span>
      <span class="clear-btn" id="clearFilters"><i class="fa fa-trash-o"></i> 清空筛选</span>
    </div>
  </div>

  <!-- 排序+搜索+结果提示 -->
  <div class="toolbar">
    <div class="sort-group">
      <span class="sort-btn active" data-sort="default">默认排序</span>
      <span class="sort-btn" data-sort="recent">最近收录</span>
      <span class="sort-btn" data-sort="update">最近更新</span>
    </div>
    <div class="toolbar-search">
      <input type="text" id="searchInput" placeholder="搜索场景名称或编码">
      <button id="searchBtn"><i class="fa fa-search"></i></button>

  // =================== 初始化统计 ===================
  function initStats() {
    const total = SCENARIOS.length;
    const published = SCENARIOS.filter(s => s.status === "published").length;
    const tasks = SCENARIOS.reduce((sum, s) => sum + s.tasksCount, 0);
    const positions = new Set(SCENARIOS.map(s => s.positionName).filter(Boolean)).size;

    animateNumber("statTotal", total);
    animateNumber("statPublished", published);
    animateNumber("statTasks", tasks);
    animateNumber("statPositions", positions);

    // 分类统计
    const industryCounts = {};
    SCENARIOS.forEach(s => { if(s.industryName) industryCounts[s.industryName] = (industryCounts[s.industryName]||0)+1; });
    document.querySelectorAll('.category-item').forEach(item => {
      const industry = item.dataset.industry;
      const countEl = item.querySelector('.category-count');
      if(industry === '全部') countEl.textContent = `${total} 个场景`;
      else if(industry === 'recent') countEl.textContent = '按时间排序';
      else countEl.textContent = `${industryCounts[industry] || 0} 个场景`;
    });
  }

  function animateNumber(id, target) {
    const el = document.getElementById(id);
    const duration = 800;
    const start = performance.now();
    function update(now) {
      const progress = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.floor(target * ease);
      if(progress < 1) requestAnimationFrame(update);
      else el.textContent = target;
    }
    requestAnimationFrame(update);
  }

    const positionFirstRow = positions.slice(0, 8);
    const positionSecondRow = positions.slice(8);

    const industryContainer = document.getElementById("industryTags");
    industryContainer.innerHTML = industryFirstRow.map((item, idx) =>
      `<span class="tag ${idx === 0 ? 'active' : ''}" data-value="${item}">${item}</span>`
    ).join("");

    const industryMoreContainer = document.getElementById("industryTagsMore");
    industryMoreContainer.innerHTML = industrySecondRow.map((item) =>
      `<span class="tag" data-value="${item}">${item}</span>`
    ).join("");

    const professionContainer = document.getElementById("professionTags");
    professionContainer.innerHTML = professionFirstRow.map((item, idx) =>
      `<span class="tag ${idx === 0 ? 'active' : ''}" data-value="${item}">${item}</span>`
    ).join("");

    const professionMoreContainer = document.getElementById("professionTagsMore");
    professionMoreContainer.innerHTML = professionSecondRow.map((item) =>
      `<span class="tag" data-value="${item}">${item}</span>`
    ).join("");

    const positionContainer = document.getElementById("positionTags");
    positionContainer.innerHTML = positionFirstRow.map((item, idx) =>
      `<span class="tag ${idx === 0 ? 'active' : ''}" data-value="${item}">${item}</span>`
    ).join("");

    const positionMoreContainer = document.getElementById("positionTagsMore");
    positionMoreContainer.innerHTML = positionSecondRow.map((item) =>
      `<span class="tag" data-value="${item}">${item}</span>`
    ).join("");

    [industryContainer, industryMoreContainer, professionContainer, professionMoreContainer, positionContainer, positionMoreContainer].forEach(container => {
      container.addEventListener("click", e => {
        if (e.target.classList.contains("tag")) {
          const groupId = container.id.replace('More', '');
          document.querySelectorAll(`#${groupId} .tag, #${groupId}More .tag`).forEach(t => t.classList.remove("active"));
          e.target.classList.add("active");
          currentPage = 1;
          renderCards();
          updateFilterSummary();
        }
      });
    });
  }

  // =================== 排序 ===================

  document.querySelectorAll(".sort-btn").forEach(btn => {

  // =================== 搜索 ===================
  const searchInput = document.getElementById("searchInput");

  function doSearch() {
    currentPage = 1;
    renderCards();
  }

  searchInput.addEventListener("input", () => { mainSearchInput.value = searchInput.value; doSearch(); });
  searchBtn.addEventListener("click", () => { mainSearchInput.value = searchInput.value; doSearch(); });

  mainSearchInput.addEventListener("input", () => { searchInput.value = mainSearchInput.value; doSearch(); });
  mainSearchBtn.addEventListener("click", () => { searchInput.value = mainSearchInput.value; doSearch(); });

  // =================== 分类快捷入口 ===================

        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));

        currentSort = 'update';

        document.querySelectorAll('#industryTags .tag, #industryTagsMore .tag').forEach(t => t.classList.remove('active'));
        const target = document.querySelector(`#industryTags .tag[data-value="${industry}"], #industryTagsMore .tag[data-value="${industry}"]`);
        if(target) target.classList.add('active');
      } else {
        document.querySelectorAll('#industryTags .tag, #industryTagsMore .tag').forEach(t => t.classList.remove('active'));

      document.querySelector('.filter-box')?.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // =================== 获取当前筛选条件 ===================
  function getFilterValues() {
    const activeIndustry = document.querySelector("#industryTags .tag.active, #industryTagsMore .tag.active");
    const activeProfession = document.querySelector("#professionTags .tag.active, #professionTagsMore .tag.active");
    const activePosition = document.querySelector("#positionTags .tag.active, #positionTagsMore .tag.active");
    return {
      industry: activeIndustry ? activeIndustry.dataset.value : "全部",
      profession: activeProfession ? activeProfession.dataset.value : "全部",
      position: activePosition ? activePosition.dataset.value : "全部",
      keyword: searchInput.value.trim().toLowerCase()
    };
  }

  function updateFilterSummary() {
    const { industry, profession, position, keyword } = getFilterValues();
    const filters = [];
    if(industry !== '全部') filters.push({ type:'industry', label:`行业：${industry}` });
    if(profession !== '全部') filters.push({ type:'profession', label:`专业：${profession}` });
    if(position !== '全部') filters.push({ type:'position', label:`岗位：${position}` });
    if(keyword) filters.push({ type:'keyword', label:`关键词：${keyword}` });

    const summary = document.getElementById('filterSummary');
    const activeFilters = document.getElementById('activeFilters');
    if(filters.length === 0) {
      summary.style.display = 'none';
      return;
    }
    summary.style.display = 'flex';
    activeFilters.innerHTML = filters.map(f =>
      `<span class="chip" data-type="${f.type}">${f.label} <i class="fa fa-times"></i></span>`
    ).join('');

    activeFilters.querySelectorAll('.chip i').forEach(icon => {
      icon.addEventListener('click', e => {
        e.stopPropagation();
        const type = icon.closest('.chip').dataset.type;
        if(type === 'industry') document.querySelector('#industryTags .tag[data-value="全部"]')?.click();
        if(type === 'profession') document.querySelector('#professionTags .tag[data-value="全部"]')?.click();
        if(type === 'position') document.querySelector('#positionTags .tag[data-value="全部"]')?.click();
        if(type === 'keyword') { searchInput.value = ''; mainSearchInput.value = ''; currentPage = 1; renderCards(); updateFilterSummary(); }
      });
    });
  }

  document.getElementById('clearFilters').addEventListener('click', () => {
    document.querySelector('#industryTags .tag[data-value="全部"]')?.click();
    document.querySelector('#professionTags .tag[data-value="全部"]')?.click();
    document.querySelector('#positionTags .tag[data-value="全部"]')?.click();
    searchInput.value = '';
    mainSearchInput.value = '';
    currentPage = 1;
    renderCards();
    updateFilterSummary();
  });

  // =================== 渲染卡片 ===================
  function getViewCount(s) {
    let hash = 0;
    for (let i = 0; i < s.id.length; i++) hash = s.id.charCodeAt(i) + ((hash << 5) - hash);
    return 100 + Math.abs(hash) % 900;
  }
  function getRelatedCount(s) {
    let hash = 0;
    for (let i = 0; i < s.code.length; i++) hash = s.code.charCodeAt(i) + ((hash << 5) - hash);
    return Math.abs(hash) % 6;
  }

  function renderCards() {
    const { industry, profession, position, keyword } = getFilterValues();

    let filtered = SCENARIOS.filter(s => {
      const matchIndustry = industry === "全部" || s.industryName === industry;
      const matchProfession = profession === "全部" || s.professionName === profession;
      const matchPosition = position === "全部" || s.positionName === position;
      const matchKeyword = !keyword || s.name.toLowerCase().includes(keyword) || s.code.toLowerCase().includes(keyword);
      return matchIndustry && matchProfession && matchPosition && matchKeyword;
    });

    if (currentSort === "recent") {
      filtered.sort((a, b) => {
        const aTime = a.publishTime ? new Date(a.publishTime) : new Date(a.updatedAt);
        const bTime = b.publishTime ? new Date(b.publishTime) : new Date(b.updatedAt);
        return bTime - aTime;
      });
    } else if (currentSort === "update") {
      filtered.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    } else if (currentSort === "name") {
      filtered.sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
    }

    const total = filtered.length;
    const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    document.getElementById("resultCount").textContent = total;

    const grid = document.getElementById("cardGrid");
    const empty = document.getElementById("emptyState");

    if (total === 0) {
      grid.innerHTML = "";
      empty.style.display = "block";
      renderPagination(0);
      return;
    }
    empty.style.display = "none";

    const paginated = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    grid.innerHTML = paginated.map((s, idx) => {
      const status = STATUS_MAP[s.status] || STATUS_MAP.draft;
      const dateStr = s.publishTime ? s.publishTime.split(" ")[0] : s.updatedAt;
      const displayDate = dateStr || "2024-01-01";
      const collectDate = s.publishTime ? s.publishTime.split(" ")[0] : (s.updatedAt || "2024-01-01");
      const coverStyle = s.coverImage ? `background-image:url('${s.coverImage}')` : `background:${COVER_BACKUPS[idx % COVER_BACKUPS.length]}`;
      const viewCount = getViewCount(s);
      const relatedScenariosCount = getRelatedCount(s);
      const coCreatorName = "知与未来";

      return `
        <div class="scene-card" data-id="${s.id}">
          <div class="card-cover" style="${coverStyle}">
            <div class="cover-tags">
              <div class="cover-tag-group">
                <span class="cover-tag">${s.version}</span>
                <span class="cover-tag">${collectDate} 收录</span>
              </div>
              <span class="cover-tag">${status.label}</span>
            </div>
            <div class="card-cover-content">
              <div class="cover-title">${s.name}</div>
              <div class="cover-meta">岗位编码：${s.code} · ${displayDate}</div>
            </div>
          </div>
          <div class="card-body">
            <div class="card-stats">
              <div class="card-stat">
                <div class="card-stat-num">${viewCount}</div>
                <div class="card-stat-label">浏览次数</div>
              </div>
              <div class="card-stat">
                <div class="card-stat-num">${relatedScenariosCount}</div>
                <div class="card-stat-label">关联场景</div>
              </div>
              <div class="card-stat">
                <div class="card-stat-num">${s.tasksCount}</div>
                <div class="card-stat-label">场景任务</div>
              </div>
            </div>
            <div class="card-tags">
              <span class="card-tag orange">面向行业：${s.industryName || "未指定"}</span>
              <span class="card-tag blue">适用专业：${s.professionName || "未分类"}</span>
            </div>
            <div class="card-info-row">
              <span>创建人：${s.creatorName || "未指定"}</span>
              <span>共建人：${coCreatorName}</span>
            </div>
            <div class="card-info-row">
              <span>浏览量：${viewCount}</span>
              <span>更新时间：${s.updatedAt || "-"}</span>
            </div>
          </div>
        </div>
      `;
    }).join("");

    grid.querySelectorAll(".scene-card").forEach(card => {
      card.addEventListener("click", () => {
        window.location.href = "student.html";
      });
    });

    renderPagination(totalPages);
  }

  // =================== 侧边岗位场景面板 ===================
  function initSidePanels() {
    const targetContainer = document.getElementById("targetPositionScenarios");
    const favoriteContainer = document.getElementById("favoritePositionScenarios");

    const targetScenarios = SCENARIOS.filter(s => s.positionName).slice(0, 8);
    const favoriteScenarios = SCENARIOS.filter(s => s.status === "published").slice(0, 8);

    function renderList(container, list) {
      if (list.length === 0) {
        container.innerHTML = '<div class="side-empty">暂无数据</div>';
        return;
      }
      container.innerHTML = list.map(s => `
        <div class="side-item" data-id="${s.id}">
          <div class="side-item-title">${s.name}</div>
          <div class="side-item-meta">${s.positionName || s.industryName || "未指定"} · ${s.code}</div>
        </div>
      `).join("");
      container.querySelectorAll(".side-item").forEach(item => {
        item.addEventListener("click", () => {
          window.location.href = "http://111.170.170.202:3002/learning-route";
        });
      });
    }

    renderList(targetContainer, targetScenarios);
    renderList(favoriteContainer, favoriteScenarios);
  }

  // =================== 分页渲染 ===================
  function renderPagination(totalPages) {
    const container = document.getElementById("pagination");
    if (totalPages <= 1) {
      container.innerHTML = "";
      return;
    }

    let html = `<button class="prev" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
    for (let i = 1; i <= totalPages; i++) {
      html += `<span class="page-number ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</span>`;
    }
    html += `<button class="next" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
    container.innerHTML = html;

    container.querySelector('.prev')?.addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; renderCards(); }
    });
    container.querySelector('.next')?.addEventListener('click', () => {
      if (currentPage < totalPages) { currentPage++; renderCards(); }
    });
    container.querySelectorAll('.page-number').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPage = parseInt(btn.dataset.page);
        renderCards();
      });
    });
  }

  // =================== 初始化 ===================
  initStats();
  initFilters();
  initSidePanels();
  renderCards();
  updateFilterSummary();

  // 更新日期时间
  function updateDateTime() {
    const now = new Date();
    const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const weekDay = weekDays[now.getDay()];
    const hour = String(now.getHours()).padStart(2, '0');
    const minute = String(now.getMinutes()).padStart(2, '0');
    const timeEl = document.getElementById('headerTime');
    if (timeEl) timeEl.textContent = `${year}年${month}月${day}日 ${weekDay} ${hour}:${minute}`;
  }
  updateDateTime();
  setInterval(updateDateTime, 60000);

  // =================== 筛选区展开/收起 ===================
  document.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = btn.dataset.target;
      const target = document.getElementById(targetId);
      if (!target) return;
      const isExpanded = target.classList.contains('expanded');
      if (isExpanded) {
        target.classList.remove('expanded');
        btn.textContent = '展开';
      } else {
        target.classList.add('expanded');
        btn.textContent = '收起';
      }
    });
  });
</script>
